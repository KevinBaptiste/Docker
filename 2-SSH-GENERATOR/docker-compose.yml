version: '3.8'

services:
  ssh-key-generator:
    build: .
    container_name: ssh-key-generator
    environment:
      - DISPLAY=${DISPLAY}
    volumes:
      # Partage du socket X11 pour l'affichage graphique
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # Persistence des clés SSH générées
      - ssh-keys:/root/.ssh
      # Optionnel: monter un dossier local pour récupérer les clés
      - ./generated-keys:/output
    network_mode: host
    stdin_open: true
    tty: true
    # Redémarre automatiquement si l'application se ferme
    restart: unless-stopped

volumes:
  ssh-keys:
    driver: local
