<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Club Med EMEA – Flashcards</title>
  <style>
    /* ── Variables ─────────────────────────────────────── */
    :root {
      --navy:   #1a3a5c;
      --yellow: #f0c040;
      --white:  #fafaf8;
      --gray:   #e8e8e8;
      --radius: 16px;
      --shadow: 0 8px 32px rgba(0,0,0,0.18);
    }

    /* ── Reset ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f2f5;
      color: var(--navy);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Loader ────────────────────────────────────────── */
    #loader {
      position: fixed; inset: 0;
      background: var(--navy);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 1rem;
      z-index: 999;
      color: white;
    }
    .loader-spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(255,255,255,0.25);
      border-top-color: var(--yellow);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Header ────────────────────────────────────────── */
    header {
      width: 100%;
      background: var(--navy);
      color: white;
      padding: 0.9rem 1.25rem 0;
    }
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 500px;
      margin: 0 auto;
    }
    header h1 {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    header h1 span { color: var(--yellow); }
    #score-display {
      font-size: 0.8rem;
      background: rgba(255,255,255,0.15);
      padding: 0.2rem 0.65rem;
      border-radius: 20px;
      white-space: nowrap;
    }
    .progress-wrap {
      max-width: 500px;
      margin: 0.7rem auto 0;
      background: rgba(255,255,255,0.2);
      height: 4px;
      border-radius: 2px;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      background: var(--yellow);
      border-radius: 2px;
      transition: width 0.35s ease;
      width: 3%;
    }
    #resort-counter {
      max-width: 500px;
      margin: 0 auto;
      text-align: center;
      font-size: 0.78rem;
      opacity: 0.75;
      padding: 0.4rem 0 0.8rem;
    }

    /* ── Main ──────────────────────────────────────────── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem 0.5rem;
      gap: 1rem;
      width: 100%;
    }

    /* ── Card scene ────────────────────────────────────── */
    .card-scene {
      width: min(380px, 95vw);
      height: calc(min(380px, 95vw) * 520 / 380);
      perspective: 1000px;
    }
    .card {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s ease-in-out;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .card.flipped { transform: rotateY(180deg); }

    /* ── Card faces ────────────────────────────────────── */
    .card-face {
      position: absolute; inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: var(--radius);
      overflow: hidden;
    }
    .card-back-face { transform: rotateY(180deg); }

    /* ── Front face ────────────────────────────────────── */
    #front-bg {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background-size: cover;
      background-position: center;
    }
    .front-top {
      position: absolute;
      top: 0.9rem; right: 0.9rem;
      z-index: 2;
    }
    .front-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.55) 55%, transparent 100%);
      padding: 3.5rem 1.2rem 1.2rem;
      z-index: 2;
    }
    .front-bottom h2 {
      color: white;
      font-size: 1.2rem;
      font-weight: 700;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
      margin-bottom: 0.2rem;
      line-height: 1.3;
    }
    .front-bottom p {
      color: rgba(255,255,255,0.85);
      font-size: 0.875rem;
      text-shadow: 0 1px 2px rgba(0,0,0,0.4);
    }

    /* ── Back face ─────────────────────────────────────── */
    #back-bg {
      position: absolute; inset: 0;
      border-radius: var(--radius);
    }
    .back-overlay {
      position: absolute; inset: 0;
      border-radius: var(--radius);
      background: rgba(0,0,0,0.45);
    }
    .back-content {
      position: absolute; inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      z-index: 1;
    }
    .back-flag {
      font-size: 4rem;
      margin-bottom: 0.75rem;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.3));
    }
    .back-content h2 {
      color: white;
      font-size: 1.75rem;
      font-weight: 700;
      text-shadow: 0 2px 5px rgba(0,0,0,0.4);
      margin-bottom: 0.35rem;
    }
    #back-region {
      color: rgba(255,255,255,0.88);
      font-size: 0.9rem;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
      margin-bottom: 0.85rem;
      font-weight: 500;
    }
    #back-desc {
      color: rgba(255,255,255,0.82);
      font-size: 0.85rem;
      line-height: 1.55;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
      max-width: 280px;
      margin-bottom: 1rem;
    }

    /* ── Badge ─────────────────────────────────────────── */
    .badge {
      background: var(--yellow);
      color: var(--navy);
      font-size: 0.68rem;
      font-weight: 800;
      padding: 0.22rem 0.6rem;
      border-radius: 20px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .badge-back-el {
      background: rgba(255,255,255,0.22);
      color: white;
      border: 1.5px solid rgba(255,255,255,0.5);
      font-size: 0.78rem;
      font-weight: 700;
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
    }

    /* ── Flip button ───────────────────────────────────── */
    .btn-flip {
      background: var(--yellow);
      color: var(--navy);
      font-weight: 700;
      font-size: 0.95rem;
      border: none;
      padding: 0.65rem 1.8rem;
      border-radius: 50px;
      cursor: pointer;
      transition: filter 0.15s, transform 0.1s;
      box-shadow: 0 3px 10px rgba(0,0,0,0.12);
    }
    .btn-flip:hover { filter: brightness(1.07); }
    .btn-flip:active { transform: scale(0.97); }

    /* ── Quiz section ──────────────────────────────────── */
    .quiz-section {
      width: min(380px, 95vw);
      text-align: center;
    }
    .quiz-q {
      font-size: 0.88rem;
      color: #555;
      margin-bottom: 0.65rem;
      font-style: italic;
    }
    .quiz-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }
    .quiz-btn {
      background: white;
      border: 2px solid var(--navy);
      color: var(--navy);
      font-size: 0.82rem;
      font-weight: 600;
      padding: 0.6rem 0.4rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.14s, color 0.14s;
      line-height: 1.3;
    }
    .quiz-btn:hover:not(:disabled) {
      background: var(--navy);
      color: white;
    }
    .quiz-btn:disabled { cursor: default; }
    .quiz-btn.quiz-correct {
      background: #2ea043 !important;
      border-color: #2ea043 !important;
      color: white !important;
      opacity: 1 !important;
    }
    .quiz-btn.quiz-incorrect {
      background: #cf222e !important;
      border-color: #cf222e !important;
      color: white !important;
    }
    .quiz-btn:disabled:not(.quiz-correct):not(.quiz-incorrect) {
      opacity: 0.45;
    }

    /* ── Navigation ────────────────────────────────────── */
    .nav-bar {
      width: 100%;
      max-width: 500px;
      display: flex;
      gap: 0.45rem;
      justify-content: center;
      flex-wrap: wrap;
      padding: 0.5rem 1rem 1.5rem;
    }
    .btn-nav {
      background: var(--navy);
      color: white;
      border: none;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 0.5rem 1rem;
      border-radius: 50px;
      cursor: pointer;
      transition: filter 0.15s, transform 0.1s;
    }
    .btn-nav:hover { filter: brightness(1.2); }
    .btn-nav:active { transform: scale(0.96); }
  </style>
</head>
<body>

  <!-- Loader -->
  <div id="loader">
    <div class="loader-spinner"></div>
    <p style="font-size:0.9rem;opacity:0.85">Chargement des resorts…</p>
  </div>

  <!-- Header -->
  <header>
    <div class="header-top">
      <h1>🌊 Club Med <span>EMEA</span></h1>
      <div id="score-display">✓ 0 / 0 tentatives</div>
    </div>
    <div class="progress-wrap">
      <div id="progress-bar"></div>
    </div>
    <div id="resort-counter">Resort 1 / 33</div>
  </header>

  <!-- Main -->
  <main>
    <!-- Card -->
    <div class="card-scene">
      <div class="card" id="card">

        <!-- FRONT -->
        <div class="card-face">
          <div id="front-bg"></div>
          <div class="front-top">
            <span id="badge-front" class="badge" style="display:none">⏳ À venir</span>
          </div>
          <div class="front-bottom">
            <h2 id="front-name"></h2>
            <p id="front-city"></p>
          </div>
        </div>

        <!-- BACK -->
        <div class="card-face card-back-face">
          <div id="back-bg"></div>
          <div class="back-overlay"></div>
          <div class="back-content">
            <div id="back-flag" class="back-flag"></div>
            <h2 id="back-country"></h2>
            <p id="back-region"></p>
            <p id="back-desc"></p>
            <span id="badge-back" class="badge-back-el" style="display:none"></span>
          </div>
        </div>

      </div>
    </div>

    <!-- Flip button -->
    <button class="btn-flip" id="btn-flip">Découvrir le pays</button>

    <!-- Quiz -->
    <div class="quiz-section" id="quiz-section">
      <p class="quiz-q">Dans quel pays se trouve ce resort ?</p>
      <div class="quiz-btns" id="quiz-btns"></div>
    </div>
  </main>

  <!-- Navigation -->
  <div class="nav-bar">
    <button class="btn-nav" id="btn-prev">← Précédent</button>
    <button class="btn-nav" id="btn-random">🔀 Aléatoire</button>
    <button class="btn-nav" id="btn-reset">↺ Réinitialiser</button>
    <button class="btn-nav" id="btn-next">Suivant →</button>
  </div>

  <script>
    // ── Config ────────────────────────────────────────────
    // Obtenez votre clé gratuite sur https://unsplash.com/developers
    const UNSPLASH_ACCESS_KEY = "";

    // ── State ─────────────────────────────────────────────
    let resorts      = [];
    let deck         = [];
    let currentIndex = 0;
    let isFlipped    = false;
    let quizAnswered = false;
    let score        = { correct: 0, attempts: 0 };
    const imageCache = {};

    // ── DOM refs ──────────────────────────────────────────
    const cardEl        = document.getElementById('card');
    const frontBg       = document.getElementById('front-bg');
    const frontName     = document.getElementById('front-name');
    const frontCity     = document.getElementById('front-city');
    const badgeFront    = document.getElementById('badge-front');
    const backBg        = document.getElementById('back-bg');
    const backFlag      = document.getElementById('back-flag');
    const backCountry   = document.getElementById('back-country');
    const backRegion    = document.getElementById('back-region');
    const backDesc      = document.getElementById('back-desc');
    const badgeBack     = document.getElementById('badge-back');
    const btnFlip       = document.getElementById('btn-flip');
    const quizSection   = document.getElementById('quiz-section');
    const quizBtns      = document.getElementById('quiz-btns');
    const progressBar   = document.getElementById('progress-bar');
    const resortCounter = document.getElementById('resort-counter');
    const scoreDisplay  = document.getElementById('score-display');

    // ── Utilities ─────────────────────────────────────────
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function strHash(str) {
      let h = 0;
      for (let i = 0; i < str.length; i++) {
        h = str.charCodeAt(i) + ((h << 5) - h);
      }
      return Math.abs(h);
    }

    function countryGradient(country) {
      const h1 = strHash(country) % 360;
      const h2 = strHash(country + '_end') % 360;
      return `linear-gradient(135deg, hsl(${h1},62%,27%), hsl(${h2},68%,42%))`;
    }

    // ── Unsplash image fetch ───────────────────────────────
    async function fetchImage(resort) {
      if (resort.id in imageCache) return imageCache[resort.id];
      imageCache[resort.id] = null; // mark as attempted

      const q = encodeURIComponent(resort.imageQuery);

      if (UNSPLASH_ACCESS_KEY) {
        try {
          const res  = await fetch(`https://api.unsplash.com/photos/random?query=${q}&orientation=landscape&client_id=${UNSPLASH_ACCESS_KEY}`);
          if (!res.ok) throw new Error();
          const data = await res.json();
          imageCache[resort.id] = data.urls.regular;
        } catch {
          imageCache[resort.id] = null;
        }
      } else {
        // Sans clé API : source Unsplash (pas de fetch nécessaire)
        imageCache[resort.id] = `https://source.unsplash.com/760x520/?${q}`;
      }

      return imageCache[resort.id];
    }

    // ── Render front ──────────────────────────────────────
    async function renderFront(resort) {
      const savedIndex = currentIndex;

      // Fallback immédiat
      frontBg.style.background = countryGradient(resort.country);
      frontBg.style.backgroundImage = '';
      frontBg.innerHTML = '';

      frontName.textContent = resort.name;
      frontCity.textContent = resort.city;
      badgeFront.style.display = resort.status === 'coming_soon' ? 'inline-block' : 'none';

      // Tentative image Unsplash
      const imgUrl = await fetchImage(resort);
      if (imgUrl && currentIndex === savedIndex) {
        frontBg.innerHTML = '';
        frontBg.style.background = `url(${imgUrl}) center/cover no-repeat, ${countryGradient(resort.country)}`;
      }
    }

    // ── Render back ───────────────────────────────────────
    async function renderBack(resort) {
      const savedIndex = currentIndex;

      // Fallback gradient immédiat
      backBg.style.background = countryGradient(resort.country);
      backFlag.textContent     = resort.countryEmoji;
      backCountry.textContent  = resort.country;
      backRegion.textContent   = resort.region;
      backDesc.textContent     = resort.description;

      if (resort.status === 'coming_soon') {
        const yr = resort.openingYear ? ` (${resort.openingYear})` : '';
        badgeBack.textContent    = `⏳ À venir${yr}`;
        badgeBack.style.display  = 'inline-block';
      } else {
        badgeBack.style.display = 'none';
      }

      // Même photo que le recto (depuis le cache ou Unsplash)
      const imgUrl = await fetchImage(resort);
      if (imgUrl && currentIndex === savedIndex) {
        backBg.style.background = `url(${imgUrl}) center/cover no-repeat, ${countryGradient(resort.country)}`;
      }
    }

    // ── Quiz ──────────────────────────────────────────────
    function generateOptions(resort) {
      const countries = [...new Set(deck.map(r => r.country))];
      const wrong     = shuffle(countries.filter(c => c !== resort.country)).slice(0, 3);
      return shuffle([resort.country, ...wrong]);
    }

    function renderQuiz(resort) {
      quizAnswered      = false;
      quizBtns.innerHTML = '';
      quizSection.style.display = 'block';

      generateOptions(resort).forEach(country => {
        const btn       = document.createElement('button');
        btn.className   = 'quiz-btn';
        btn.textContent = country;
        btn.dataset.country = country;
        btn.addEventListener('click', () => handleAnswer(country, resort));
        quizBtns.appendChild(btn);
      });
    }

    function handleAnswer(selected, resort) {
      if (quizAnswered) return;
      quizAnswered = true;
      score.attempts++;

      const correct    = resort.country;
      const isCorrect  = selected === correct;
      if (isCorrect) score.correct++;

      quizBtns.querySelectorAll('.quiz-btn').forEach(btn => {
        btn.disabled = true;
        if (btn.dataset.country === correct) {
          btn.classList.add('quiz-correct');
          if (isCorrect) btn.textContent += ' ✓';
        } else if (btn.dataset.country === selected && !isCorrect) {
          btn.classList.add('quiz-incorrect');
          btn.textContent += ' ✗';
        }
      });

      updateScore();

      if (isCorrect) {
        setTimeout(() => { if (!isFlipped) flipCard(); }, 800);
      }
    }

    // ── Flip ──────────────────────────────────────────────
    function flipCard() {
      isFlipped = !isFlipped;
      cardEl.classList.toggle('flipped', isFlipped);
      btnFlip.textContent           = isFlipped ? 'Retourner la carte' : 'Découvrir le pays';
      quizSection.style.display     = isFlipped ? 'none' : 'block';
    }

    function resetFlipSilent() {
      if (!isFlipped) return;
      cardEl.style.transition = 'none';
      cardEl.classList.remove('flipped');
      void cardEl.offsetWidth; // force reflow
      cardEl.style.transition = '';
      isFlipped               = false;
      btnFlip.textContent     = 'Découvrir le pays';
    }

    // ── Render ────────────────────────────────────────────
    function renderCard() {
      const resort = deck[currentIndex];
      renderFront(resort);
      renderBack(resort);
      renderQuiz(resort);
      updateProgress();
    }

    function goTo(index) {
      resetFlipSilent();
      currentIndex = index;
      renderCard();
    }

    // ── Navigation ────────────────────────────────────────
    function goNext()   { if (currentIndex < deck.length - 1) goTo(currentIndex + 1); }
    function goPrev()   { if (currentIndex > 0) goTo(currentIndex - 1); }

    function randomize() {
      deck  = shuffle(resorts);
      score = { correct: 0, attempts: 0 };
      updateScore();
      resetFlipSilent();
      currentIndex = 0;
      renderCard();
    }

    function resetDeck() {
      deck  = [...resorts];
      score = { correct: 0, attempts: 0 };
      updateScore();
      resetFlipSilent();
      currentIndex = 0;
      renderCard();
    }

    // ── UI updates ────────────────────────────────────────
    function updateProgress() {
      const total   = deck.length;
      const current = currentIndex + 1;
      resortCounter.textContent = `Resort ${current} / ${total}`;
      progressBar.style.width   = `${(current / total) * 100}%`;
    }

    function updateScore() {
      scoreDisplay.textContent = `✓ ${score.correct} / ${score.attempts} tentatives`;
    }

    // ── Init ──────────────────────────────────────────────
    async function init() {
      try {
        const res = await fetch('/api/resorts');
        resorts   = await res.json();
        deck      = shuffle([...resorts]);

        btnFlip.addEventListener('click', flipCard);
        document.getElementById('btn-next').addEventListener('click', goNext);
        document.getElementById('btn-prev').addEventListener('click', goPrev);
        document.getElementById('btn-random').addEventListener('click', randomize);
        document.getElementById('btn-reset').addEventListener('click', resetDeck);

        renderCard();
        updateScore();
      } catch (e) {
        document.querySelector('main').innerHTML =
          '<p style="color:#cf222e;padding:2rem;text-align:center">Erreur de chargement des données. Vérifiez que le serveur est démarré.</p>';
      } finally {
        document.getElementById('loader').style.display = 'none';
      }
    }

    init();
  </script>
</body>
</html>
