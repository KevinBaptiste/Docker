services:
  termix:
    image: ghcr.io/lukegus/termix:latest
    container_name: termix
    restart: unless-stopped
    volumes:
      - termix-data:/app/data
    networks:
      - subnet1

  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - npm-data:/data
      - npm-letsencrypt:/etc/letsencrypt
    networks:
      - subnet1
    depends_on:
      - termix

volumes:
  termix-data:
    driver: local
  npm-data:
    driver: local
  npm-letsencrypt:
    driver: local

networks:
  subnet1:
    name: subnet1
    driver: bridge